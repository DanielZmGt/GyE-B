<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="woodGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.2" numOctaves="4" result="noise" seed="3" />
      <feComponentTransfer in="noise" result="enhancedNoise">
        <feFuncA type="linear" slope="1.5" intercept="-0.2" />
      </feComponentTransfer>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.6
        0 0 0 0 0.5
        0 0 0 0 0.3
        0 0 0 0.5 0" in="enhancedNoise" result="darkGrain" />
      <feBlend in="darkGrain" in2="SourceGraphic" mode="multiply" result="finalTexture" />
      <feSpecularLighting in="darkGrain" surfaceScale="0.5" specularConstant="0.15" specularExponent="20" lighting-color="#ffffff" result="specular">
        <feDistantLight azimuth="45" elevation="60" />
      </feSpecularLighting>
      <feComposite in="specular" in2="finalTexture" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#E8D8BA" />
  <rect width="100%" height="100%" filter="url(#woodGrain)" />
</svg>