<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="woodGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.005" numOctaves="5" result="noise"/>
      <feDiffuseLighting lighting-color="#5e4026" surfaceScale="2" diffuseConstant="1.5">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#3e2b19" filter="url(#woodGrain)"/>
  <rect width="100%" height="100%" fill="#5e4026" opacity="0.4"/>
</svg>