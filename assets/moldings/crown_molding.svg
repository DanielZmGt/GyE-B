<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Complex Crown Molding Gradient -->
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3b2a;stop-opacity:1" />
      <stop offset="10%" style="stop-color:#6b543e;stop-opacity:1" />
      <stop offset="12%" style="stop-color:#3e3020;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#6b543e;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#4a3b2a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#806349;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#3e3020;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#6b543e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3b2a;stop-opacity:1" />
    </linearGradient>
    <filter id="crownGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.005" numOctaves="4" result="noise"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feBlend mode="multiply" in="noise" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#crownGrad)" filter="url(#crownGrain)"/>
  <!-- Highlights for 3D effect -->
  <rect y="10%" width="100%" height="2%" fill="#ffffff" opacity="0.1"/>
  <rect y="60%" width="100%" height="5%" fill="#ffffff" opacity="0.15"/>
</svg>