<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4a484;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#e0c3a6;stop-opacity:1" /> <!-- Top cap highlight -->
      <stop offset="18%" style="stop-color:#8b7355;stop-opacity:1" /> <!-- Deep groove -->
      <stop offset="25%" style="stop-color:#c4a484;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b08d68;stop-opacity:1" />
    </linearGradient>
    <filter id="mapleGrain">
      <feTurbulence type="turbulence" baseFrequency="0.08 0.01" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0.4"/>
      <feBlend mode="soft-light" in="noise" in2="SourceGraphic" opacity="0.5"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#baseGrad)"/>
  <rect width="100%" height="100%" filter="url(#mapleGrain)" opacity="0.6"/>
</svg>