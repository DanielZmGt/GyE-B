<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="railGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0404;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#701212;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9e2a2b;stop-opacity:1" /> <!-- Center highlight -->
      <stop offset="80%" style="stop-color:#701212;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0404;stop-opacity:1" />
    </linearGradient>
    <filter id="mahoganyGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.002" numOctaves="4" result="noise"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#railGrad)"/>
  <rect width="100%" height="100%" filter="url(#mahoganyGrain)" opacity="0.15" style="mix-blend-mode: multiply"/>
</svg>