<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="oakGrain">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.1" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0.2"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#d2b48c"/>
  <rect width="100%" height="100%" filter="url(#oakGrain)" opacity="0.3"/>
  <rect width="100%" height="100%" fill="rgba(160, 82, 45, 0.2)"/>
</svg>