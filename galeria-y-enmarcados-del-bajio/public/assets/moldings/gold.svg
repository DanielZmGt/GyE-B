<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="goldLeaf">
      <feTurbulence type="fractalNoise" baseFrequency="0.2" numOctaves="4" result="noise"/>
      <feSpecularLighting surfaceScale="5" specularConstant="1.2" specularExponent="20" lighting-color="#ffd700" result="specular">
        <fePointLight x="100" y="100" z="50"/>
      </feSpecularLighting>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#DAA520"/>
  <rect width="100%" height="100%" filter="url(#goldLeaf)" opacity="0.6"/>
</svg>